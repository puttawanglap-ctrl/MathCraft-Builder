<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อาณาจักรสัตว์มีกระดูกสันหลัง (Vertebrates Adventure)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Mali', cursive;
            margin: 0;
            overflow: hidden;
            background-color: #111827;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .game-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* บังคับสัดส่วนแนวตั้ง Mobile-First ให้ดูพรีเมียม */
            margin: 0 auto;
            position: relative;
            background: linear-gradient(to bottom, #1e3a8a 0%, #3b82f6 50%, #93c5fd 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border-left: 4px solid #3b82f6;
            border-right: 4px solid #3b82f6;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-gentle { animation: bounce-gentle 2s ease-in-out infinite; }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0.8); }
            70% { box-shadow: 0 0 0 15px rgba(253, 224, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0); }
        }
        .node-active { animation: pulse-glow 2s infinite; }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        .falling-item {
            position: absolute;
            animation: fall linear forwards;
        }

        .map-bg {
            background: radial-gradient(circle, #86efac 10%, #4ade80 60%, #16a34a 100%);
            background-size: cover;
        }

        .star-bg {
            background: linear-gradient(to bottom, #020617, #0f172a, #1e293b);
        }

        /* Glassmorphism & Cartoon Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #1e3a8a;
            box-shadow: 0 8px 0px #1e3a8a, 0 15px 20px rgba(0,0,0,0.3);
            border-radius: 1.5rem;
        }

        .cartoon-btn {
            transition: all 0.15s ease-in-out;
            border-bottom-width: 6px;
        }
        .cartoon-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* --- 3D CARD FLIP STYLES (CRITICAL FIX FOR ALL BROWSERS) --- */
        .perspective-container {
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .card-front {
            background-color: #fbbf24; /* bg-amber-400 */
            border: 4px solid #78350f; /* border-amber-900 */
            transform: rotateY(0deg);
            -webkit-transform: rotateY(0deg);
        }
        .card-back {
            background-color: #ffffff;
            border: 4px solid #78350f;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }

        /* Scrollbar customizing */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- AUDIO ENGINE (Web Audio API Synthesizer) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;
        
        const playSound = (type) => {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, now); // D5
                osc.frequency.setValueAtTime(880, now + 0.08); // A5
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'win') {
                // Happy chord
                const freqs = [523.25, 659.25, 783.99, 1046.50]; // C E G C
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i * 0.08);
                    g.gain.setValueAtTime(0.1, now + i * 0.08);
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    o.start(now + i * 0.08);
                    o.stop(now + 0.5);
                });
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.3);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        };

        // --- DATABASE ---
        const ZONES = [
            { id: 1, name: "เมืองใต้ทะเล", type: "ปลา", icon: "🐟", color: "bg-blue-500", border: "border-blue-700", top: "72%", left: "25%", info: "อาศัยในน้ำ, หายใจด้วยเหงือก, มีครีบช่วยว่ายน้ำ, อุณหภูมิร่างกายเปลี่ยนตามน้ำ (สัตว์เลือดเย็น)" },
            { id: 2, name: "บึงมหัศจรรย์", type: "สัตว์สะเทินน้ำสะเทินบก", icon: "🐸", color: "bg-emerald-500", border: "border-emerald-700", top: "58%", left: "75%", info: "อยู่ได้ทั้งบนบกและในน้ำ, ผิวหนังเปียกชื้นไม่มีเกล็ด, วางไข่ในน้ำ, ตอนเด็กใช้เหงือก โตขึ้นใช้ปอดและผิวหนัง" },
            { id: 3, name: "ทะเลทรายมังกร", type: "สัตว์เลื้อยคลาน", icon: "🦎", color: "bg-amber-600", border: "border-amber-800", top: "40%", left: "25%", info: "ผิวหนังหนา แห้ง มีเกล็ดแข็งปกคลุม, หายใจด้วยปอด, วางไข่บนบกมีเปลือกเหนียวหุ้ม" },
            { id: 4, name: "ป่าท้องฟ้า", type: "นก", icon: "🐦", color: "bg-sky-400", border: "border-sky-600", top: "24%", left: "75%", info: "มีขนเป็นแผงปกคลุมร่างกาย, ขาคู่หน้าพัฒนาเป็นปีก, กระดูกกลวงและเบาช่วยให้บินได้, ออกลูกเป็นไข่" },
            { id: 5, name: "ป่ามหัศจรรย์", type: "สัตว์เลี้ยงลูกด้วยนม", icon: "🐘", color: "bg-pink-500", border: "border-pink-700", top: "10%", left: "30%", info: "ตัวเมียมีต่อมน้ำนมเลี้ยงลูก, มีขนเป็นเส้นๆ, หายใจด้วยปอด, ส่วนใหญ่ออกลูกเป็นตัวและเป็นสัตว์เลือดอุ่น" }
        ];

        // --- COMPONENTS ---

        const Button = ({ children, onClick, color = "bg-yellow-400 border-yellow-600 hover:bg-yellow-300", className = "" }) => (
            <button 
                onClick={() => { playSound('coin'); onClick(); }}
                className={`cartoon-btn text-blue-900 font-bold py-3 px-6 rounded-2xl border-b-[6px] active:border-b-[2px] transition-all text-lg active:scale-95 flex items-center justify-center gap-2 ${color} ${className}`}
            >
                {children}
            </button>
        );

        // Header Helper (Mute sound and simple status)
        const GameHeader = ({ onMuteToggle, isMutedState, onBackMenu }) => (
            <div className="absolute top-3 left-3 right-3 flex justify-between items-center z-50">
                {onBackMenu ? (
                    <button onClick={onBackMenu} className="w-10 h-10 bg-white/90 border-2 border-blue-900 text-blue-900 rounded-full flex items-center justify-center font-bold active:scale-95 shadow">
                        <i className="fa-solid fa-house"></i>
                    </button>
                ) : <div className="w-10"></div>}
                
                <button 
                    onClick={() => {
                        isMuted = !isMuted;
                        onMuteToggle(isMuted);
                    }} 
                    className="w-10 h-10 bg-white/90 border-2 border-blue-900 text-blue-900 rounded-full flex items-center justify-center font-bold active:scale-95 shadow"
                >
                    <i className={`fa-solid ${isMutedState ? 'fa-volume-mute text-red-500' : 'fa-volume-high text-green-600'}`}></i>
                </button>
            </div>
        );

        // 1. Scene: Main Menu
        const MainMenu = ({ onStart }) => (
            <div className="h-full flex flex-col items-center justify-center text-center p-6 bg-[linear-gradient(to_bottom,rgba(30,58,138,0.3),rgba(30,58,138,0.7)),url('https://www.transparenttextures.com/patterns/cubes.png')] relative">
                <div className="absolute inset-0 bg-blue-900/10"></div>
                
                <div className="relative z-10 glass-panel p-6 w-full max-w-sm animate-float border-t-8 border-t-yellow-400">
                    <div className="text-7xl mb-4 animate-bounce-gentle">🌍🐢🐾</div>
                    <h1 className="text-3xl font-bold text-blue-900 mb-1 leading-tight">อาณาจักรสัตว์</h1>
                    <h2 className="text-xl font-bold text-green-600 mb-6 bg-green-100 py-1 px-4 rounded-full inline-block">มีกระดูกสันหลัง 🦴</h2>
                    <p className="text-gray-700 text-sm mb-6 leading-relaxed">
                        มาร่วมเดินทางเป็น "นักสำรวจตัวน้อย"<br/>
                        เพื่อรวบรวมกลุ่มสัตว์ทั้ง 5 และช่วยต้นไม้แห่งชีวิต!
                    </p>
                    <Button onClick={onStart} className="w-full text-xl py-4 bg-green-400 border-green-600 hover:bg-green-300 text-white shadow-lg">
                        <i className="fa-solid fa-compass animate-spin mr-1"></i> เริ่มต้นเดินทาง!
                    </Button>
                </div>
                
                <div className="absolute bottom-4 text-xs text-white/70">
                    พัฒนาเพื่อการศึกษาสำหรับนักเรียนระดับประถมศึกษา 🎒
                </div>
            </div>
        );

        // 2. Scene: Register (ลงชื่อ ชั้น เลขที่)
        const RegisterScreen = ({ onRegister }) => {
            const [name, setName] = React.useState('');
            const [grade, setGrade] = React.useState('ป.1');
            const [room, setRoom] = React.useState('1');
            const [no, setNo] = React.useState('');
            const [error, setError] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name.trim()) {
                    setError('กรุณากรอกชื่อ-นามสกุล ด้วยนะจ๊ะเด็กๆ!');
                    playSound('wrong');
                    return;
                }
                if (!no || isNaN(no) || parseInt(no) <= 0) {
                    setError('กรุณากรอกเลขที่ให้ถูกต้องนะจ๊ะ!');
                    playSound('wrong');
                    return;
                }
                onRegister({ name, class: `${grade}/${room}`, no });
            };

            return (
                <div className="h-full flex flex-col items-center justify-center p-6 bg-gradient-to-b from-teal-400 to-blue-600">
                    <div className="glass-panel p-6 w-full max-w-sm relative border-t-8 border-t-teal-500">
                        <div className="text-center mb-4">
                            <span className="text-5xl">📝</span>
                            <h2 className="text-2xl font-bold text-blue-900 mt-2">ข้อมูลผู้สำรวจ</h2>
                            <p className="text-xs text-gray-500">กรอกข้อมูลเพื่อรับเกียรติบัตรตอนเล่นจบเกมนะ!</p>
                        </div>

                        {error && (
                            <div className="bg-red-100 border border-red-400 text-red-700 px-3 py-2 rounded-xl text-xs mb-3 text-center animate-bounce">
                                ⚠️ {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-gray-700 font-bold text-sm mb-1">✍️ ชื่อ - นามสกุล</label>
                                <input 
                                    type="text" 
                                    value={name} 
                                    onChange={(e) => { setName(e.target.value); setError(''); }}
                                    placeholder="เด็กชาย/เด็กหญิง..."
                                    className="w-full px-4 py-2 rounded-xl border-2 border-blue-200 focus:border-blue-500 outline-none text-gray-800 text-sm"
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-gray-700 font-bold text-sm mb-1">🎒 ชั้นเรียน</label>
                                    <div className="flex gap-1">
                                        <select 
                                            value={grade} 
                                            onChange={(e) => setGrade(e.target.value)}
                                            className="w-1/2 px-2 py-2 rounded-xl border-2 border-blue-200 text-gray-800 text-sm"
                                        >
                                            {['ป.1', 'ป.2', 'ป.3', 'ป.4', 'ป.5', 'ป.6'].map(g => (
                                                <option key={g} value={g}>{g}</option>
                                            ))}
                                        </select>
                                        <select 
                                            value={room} 
                                            onChange={(e) => setRoom(e.target.value)}
                                            className="w-1/2 px-2 py-2 rounded-xl border-2 border-blue-200 text-gray-800 text-sm"
                                        >
                                            {[1,2,3,4,5,6,7,8].map(r => (
                                                <option key={r} value={r}>/{r}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold text-sm mb-1">🔢 เลขที่</label>
                                    <input 
                                        type="number" 
                                        value={no} 
                                        onChange={(e) => { setNo(e.target.value); setError(''); }}
                                        placeholder="เลขที่"
                                        min="1"
                                        className="w-full px-4 py-2 rounded-xl border-2 border-blue-200 focus:border-blue-500 outline-none text-gray-800 text-sm"
                                    />
                                </div>
                            </div>

                            <Button onClick={() => {}} className="w-full bg-yellow-400 border-yellow-600 text-lg py-3 mt-4">
                                <i className="fa-solid fa-clipboard-check mr-1"></i> ยืนยันข้อมูล 🌟
                            </Button>
                        </form>
                    </div>
                </div>
            );
        };

        // 3. Scene: Intro Story
        const IntroStory = ({ onNext, studentInfo }) => {
            const [step, setStep] = React.useState(0);
            const dialogs = [
                `ยินดีต้อนรับนักสำรวจ "คุณครูเต่าน้อย" ดีใจมากๆ ที่ได้รู้จักนะจ๊ะ คุณ ${studentInfo.name}!`,
                "ตอนนี้ต้นไม้แห่งชีวิตในอาณาจักรเรากำลังเฉาตาย เพราะเด็กๆ เริ่มสับสนประเภทของพวกเราแล้ว...",
                "สัตว์มีกระดูกสันหลัง คือพวกที่มีโครงกระดูกช่วยพยุงร่างและป้องกันระบบประสาทนะจ๊ะ",
                "เธอต้องเดินทางไปรวบรวมแก่นพลังจากสัตว์ทั้ง 5 ดินแดน และมาปราบ 'ราชาสับสน' กัน!",
                "ถ้าพร้อมแล้วสะพายกระเป๋าเป้ แล้วเริ่มเดินทางได้เลยจ้า!"
            ];

            return (
                <div className="h-full flex flex-col items-center justify-end pb-12 px-6 bg-gradient-to-b from-sky-400 to-emerald-400">
                    <div className="text-8xl mb-6 animate-float">🐢</div>
                    <div className="glass-panel p-5 w-full max-w-sm relative text-center border-t-8 border-t-blue-500">
                        <div className="absolute -top-4 left-6 bg-blue-950 text-white px-4 py-1 rounded-full text-xs font-bold">
                            ศาสตราจารย์เต่าน้อย
                        </div>
                        <p className="text-blue-950 text-base font-semibold mb-6 mt-2 leading-relaxed">{dialogs[step]}</p>
                        <Button 
                            onClick={() => {
                                if (step < dialogs.length - 1) setStep(step + 1);
                                else onNext();
                            }}
                            className="mx-auto w-full max-w-[200px]"
                        >
                            {step < dialogs.length - 1 ? 'ถัดไป ➡️' : 'เริ่มภารกิจ! 🚀'}
                        </Button>
                    </div>
                </div>
            );
        };

        // 4. Scene: World Map
        const WorldMap = ({ saveFile, onSelectLevel, onOpenBook, studentInfo }) => {
            // Calculate progress percentage
            const progress = (saveFile.completedLevels.length / 5) * 100;

            return (
                <div className="h-full relative map-bg">
                    {/* Top UI Panel */}
                    <div className="absolute top-16 left-3 right-3 flex flex-col gap-2 z-10">
                        <div className="glass-panel p-3 bg-white/95 border-blue-900 rounded-2xl flex flex-col gap-1 shadow-md">
                            <div className="flex justify-between items-center">
                                <div className="text-xs text-blue-950 font-bold flex items-center gap-1">
                                    <span className="text-sm">🤠</span> {studentInfo.name} <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[10px]">ชั้น {studentInfo.class} เลขที่ {studentInfo.no}</span>
                                </div>
                                <div className="text-white font-bold flex items-center bg-yellow-500 border-2 border-yellow-600 px-3 py-0.5 rounded-full text-xs">
                                    <span className="text-yellow-100 mr-1">⭐</span> {saveFile.stars}
                                </div>
                            </div>
                            {/* Progress bar */}
                            <div className="w-full bg-blue-100 h-3.5 rounded-full overflow-hidden border-2 border-blue-950 mt-1 flex items-center relative">
                                <div className="bg-gradient-to-r from-green-400 to-emerald-500 h-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                <span className="absolute w-full text-center text-[9px] font-bold text-blue-950">ความคืบหน้า {Math.round(progress)}%</span>
                            </div>
                        </div>

                        {/* Special Actions */}
                        <div className="flex justify-end gap-2">
                            <Button onClick={onOpenBook} color="bg-purple-400 border-purple-600 hover:bg-purple-300 text-white" className="!py-1.5 !px-4 text-xs">
                                <i className="fa-solid fa-book mr-1"></i> สมุดสะสมสัตว์ 📖
                            </Button>
                        </div>
                    </div>
                    
                    {/* Map Nodes */}
                    {ZONES.map((zone) => {
                        const isUnlocked = saveFile.unlockedLevels >= zone.id;
                        const isCompleted = saveFile.completedLevels.includes(zone.id);
                        return (
                            <div 
                                key={zone.id}
                                className={`absolute flex flex-col items-center transition-all ${!isUnlocked ? 'opacity-40 grayscale' : 'cursor-pointer hover:scale-110'}`}
                                style={{ top: zone.top, left: zone.left, transform: 'translate(-50%, -50%)' }}
                                onClick={() => {
                                    if (isUnlocked) onSelectLevel(zone.id);
                                    else playSound('wrong');
                                }}
                            >
                                <div className={`w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-lg border-4 ${isCompleted ? 'border-yellow-400 bg-emerald-400' : 'border-white'} ${zone.color} ${isUnlocked && !isCompleted ? 'node-active' : ''} z-10`}>
                                    {zone.icon}
                                </div>
                                <div className="mt-1 bg-blue-950 border border-white text-white font-bold text-[10px] px-2 py-0.5 rounded-md whitespace-nowrap z-10 shadow-sm">
                                    {zone.name}
                                </div>
                                {isCompleted && <div className="absolute -top-3 -right-3 text-lg z-20 animate-bounce">⭐</div>}
                            </div>
                        );
                    })}

                    {/* Boss Node */}
                    <div 
                        className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center transition-all ${saveFile.completedLevels.length >= 5 ? 'cursor-pointer hover:scale-110 node-active' : 'opacity-40 grayscale'}`}
                        onClick={() => {
                            if (saveFile.completedLevels.length >= 5) onSelectLevel('boss');
                            else playSound('wrong');
                        }}
                    >
                        <div className="w-20 h-20 rounded-full flex items-center justify-center text-4xl shadow-2xl border-4 border-red-500 bg-slate-900 z-10">
                            👑
                        </div>
                        <div className="mt-1 bg-red-600 border border-white text-white font-bold text-xs px-3 py-1 rounded-full z-10 animate-pulse whitespace-nowrap">
                            ด่านบอส: พิชิตราชาสับสน ⚔️
                        </div>
                    </div>
                </div>
            );
        };

        // 5. Mini Games
        
        // Game 1: Fish (Catch Food, Dodge Trash)
        const GameFish = ({ onWin }) => {
            const [score, setScore] = React.useState(0);
            const [items, setItems] = React.useState([]);
            const [gameActive, setGameActive] = React.useState(true);

            React.useEffect(() => {
                if (!gameActive) return;
                const spawnRate = setInterval(() => {
                    const isGood = Math.random() > 0.4;
                    const id = Date.now() + Math.random();
                    const left = Math.floor(Math.random() * 80) + 10;
                    const duration = Math.random() * 1.5 + 2.5; // Faster for excitement!
                    
                    const newItem = { id, isGood, left, duration, emoji: isGood ? (Math.random() > 0.5 ? '🦐' : '🌱') : (Math.random() > 0.5 ? '🗑️' : '🛢️') };
                    setItems(prev => [...prev, newItem]);

                    setTimeout(() => {
                        setItems(prev => prev.filter(i => i.id !== id));
                    }, duration * 1000);

                }, 900);
                return () => clearInterval(spawnRate);
            }, [gameActive]);

            React.useEffect(() => {
                if (score >= 10) {
                    setGameActive(false);
                    playSound('win');
                    setTimeout(onWin, 2000);
                }
            }, [score]);

            const handleClick = (item) => {
                if (!gameActive) return;
                if (item.isGood) {
                    playSound('coin');
                    setScore(s => s + 1);
                } else {
                    playSound('wrong');
                    setScore(s => Math.max(0, s - 2));
                }
                setItems(prev => prev.filter(i => i.id !== item.id));
            };

            return (
                <div className="h-full bg-blue-500 relative overflow-hidden flex flex-col bg-gradient-to-b from-sky-600 to-blue-900">
                    <div className="p-4 bg-black/40 text-white flex justify-between items-center z-10 border-b-2 border-white/20 mt-12">
                        <div className="font-bold text-lg">ด่านที่ 1: กลุ่มปลา 🐟</div>
                        <div className="font-bold text-yellow-300 bg-blue-950 px-3 py-1 rounded-full border border-yellow-300">คะแนน: {score} / 10</div>
                    </div>
                    
                    <div className="text-white text-center mt-3 z-10 bg-black/30 p-3 mx-4 rounded-xl border border-white/10 text-xs leading-relaxed">
                        <strong className="text-yellow-200">เกร็ดความรู้:</strong> สัตว์น้ำ หายใจด้วยเหงือก ใช้ครีบว่ายน้ำนะจ๊ะ!<br/>
                        <span className="text-emerald-300 font-bold">👉 แตะจับอาหารสัตว์น้ำ (🦐🌱) และหลีกเลี่ยงขยะมลพิษ!</span>
                    </div>
                    
                    {items.map(item => (
                        <div 
                            key={item.id}
                            className="falling-item text-5xl cursor-pointer select-none active:scale-125 transition-transform"
                            style={{ 
                                left: `${item.left}%`, 
                                animationDuration: `${item.duration}s` 
                            }}
                            onMouseDown={() => handleClick(item)}
                            onTouchStart={(e) => { e.preventDefault(); handleClick(item); }}
                        >
                            {item.emoji}
                        </div>
                    ))}
                    
                    {score >= 10 && (
                        <div className="absolute inset-0 bg-blue-950/90 flex items-center justify-center flex-col z-20 animate-fade-in">
                            <div className="text-7xl mb-4 animate-bounce">🏆</div>
                            <h2 className="text-3xl text-yellow-300 font-bold">สุดยอดคุณหนู!</h2>
                            <p className="text-white mt-2">ผ่านบททดสอบเมืองใต้ทะเลแล้ว</p>
                        </div>
                    )}
                </div>
            );
        };

        // Game 2: Frog (Jump & Trivia)
        const GameFrog = ({ onWin }) => {
            const [step, setStep] = React.useState(0);
            const questions = [
                { q: "สัตว์สะเทินน้ำสะเทินบก อาศัยอยู่อย่างไร?", a: "อยู่ได้ทั้งบนบกและในน้ำ 🐸", b: "อยู่ในน้ำลึกเท่านั้น 🐋", correct: "a" },
                { q: "ผิวหนังของกบมีลักษณะเด่นอย่างไรบ้าง?", a: "แห้ง มีเกล็ดแข็ง 🦎", b: "ผิวเปียกชื้น ไม่มีขนหรือเกล็ด 🐸", correct: "b" },
                { q: "ตอนเป็นลูกอ๊อด ตัวอ่อนหายใจด้วยอะไร?", a: "เหงือก 🐟", b: "ปอด 🐒", correct: "a" }
            ];

            const handleAnswer = (ans) => {
                if (ans === questions[step].correct) {
                    playSound('jump');
                    if (step === questions.length - 1) {
                        playSound('win');
                        setTimeout(onWin, 1500);
                    } else {
                        setStep(s => s + 1);
                    }
                } else {
                    playSound('wrong');
                }
            };

            return (
                <div className="h-full bg-emerald-800 relative overflow-hidden flex flex-col items-center bg-gradient-to-b from-green-600 to-emerald-950">
                    <div className="w-full p-4 bg-black/40 text-white text-center font-bold text-lg z-10 border-b-2 border-white/20 mt-12">
                        ด่านที่ 2: สัตว์สะเทินน้ำสะเทินบก 🐸
                    </div>
                    
                    <div className="flex-1 w-full relative flex flex-col justify-end items-center pb-24">
                        {/* Lilypads with frog visual progress */}
                        {[0,1,2,3].map(i => (
                            <div key={i} className={`w-36 h-12 bg-emerald-500 rounded-[50%] border-b-8 border-emerald-900 mb-6 flex items-center justify-center transition-all duration-500 ${step === i ? 'opacity-100 scale-110 shadow-[0_0_25px_rgba(253,224,71,0.8)]' : 'opacity-40'}`}>
                                {step === i && <div className="text-5xl -mt-10 animate-bounce">🐸</div>}
                            </div>
                        ))}
                    </div>

                    {step < questions.length && (
                        <div className="absolute bottom-6 left-4 right-4 glass-panel p-5 z-20 border-emerald-900">
                            <div className="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full inline-block font-bold mb-2">
                                คำถามข้อที่ {step + 1}/{questions.length}
                            </div>
                            <p className="text-blue-950 font-bold mb-4 text-base">{questions[step].q}</p>
                            <div className="flex flex-col gap-2.5">
                                <Button onClick={() => handleAnswer('a')} className="w-full text-sm bg-blue-100 border-blue-300 text-blue-900 hover:bg-blue-200">{questions[step].a}</Button>
                                <Button onClick={() => handleAnswer('b')} className="w-full text-sm bg-blue-100 border-blue-300 text-blue-900 hover:bg-blue-200">{questions[step].b}</Button>
                            </div>
                        </div>
                    )}

                    {step >= questions.length && (
                        <div className="absolute inset-0 bg-emerald-950/90 flex items-center justify-center flex-col z-30">
                            <div className="text-7xl mb-4 animate-bounce">🏆</div>
                            <h2 className="text-3xl text-yellow-300 font-bold">ยินดีด้วยเก่งมาก!</h2>
                            <p className="text-white mt-1">ช่วยเจ้ากบน้อยกระโดดข้ามบึงสำเร็จ!</p>
                        </div>
                    )}
                </div>
            );
        };

        // Game 3: Reptile (Memory Match) -- COMPLETE UI/UX REWRITE FOR ACCESSIBILITY AND PERFECT 3D TRANSFORMS
        const GameReptile = ({ onWin }) => {
            const emojis = ['🦎', '🐍', '🐢', '🐊'];
            const [cards, setCards] = React.useState([]);
            const [flipped, setFlipped] = React.useState([]);
            const [matched, setMatched] = React.useState([]);
            const [isBusy, setIsBusy] = React.useState(false);

            React.useEffect(() => {
                const shuffled = [...emojis, ...emojis]
                    .sort(() => Math.random() - 0.5)
                    .map((emoji, idx) => ({ id: idx, emoji }));
                setCards(shuffled);
            }, []);

            React.useEffect(() => {
                if (matched.length === emojis.length) {
                    playSound('win');
                    setTimeout(onWin, 2000);
                }
            }, [matched]);

            const handleFlip = (idx) => {
                // Ignore if currently locked, already flipped, or matched
                if (isBusy || flipped.length >= 2 || flipped.includes(idx) || matched.includes(cards[idx].emoji)) {
                    return;
                }

                playSound('jump');
                const newFlipped = [...flipped, idx];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setIsBusy(true); // Lock clicking to prevent state corruption
                    const firstCard = cards[newFlipped[0]];
                    const secondCard = cards[newFlipped[1]];

                    if (firstCard.emoji === secondCard.emoji) {
                        // MATCH
                        setTimeout(() => {
                            playSound('coin');
                            setMatched(prev => [...prev, firstCard.emoji]);
                            setFlipped([]);
                            setIsBusy(false);
                        }, 500);
                    } else {
                        // MISMATCH - Flip back after delay
                        setTimeout(() => {
                            playSound('wrong');
                            setFlipped([]);
                            setIsBusy(false);
                        }, 1000);
                    }
                }
            };

            return (
                <div className="h-full bg-amber-700 relative overflow-hidden flex flex-col items-center bg-gradient-to-b from-amber-600 to-amber-950">
                    <div className="w-full p-4 bg-black/40 text-white text-center font-bold text-lg z-10 mt-12">
                        ด่านที่ 3: สัตว์เลื้อยคลาน 🦎
                    </div>
                    
                    <div className="text-white text-center mt-3 z-10 bg-black/30 p-2.5 mx-4 rounded-xl text-xs">
                        <strong className="text-yellow-200">เกร็ดความรู้:</strong> สัตว์เลือดเย็น ผิวหนังแห้ง มีเกล็ดหนา และวางไข่บนบก!<br/>
                        <span className="text-emerald-300 font-bold">🧩 แตะการ์ดด้านล่างเพื่อจับคู่พวกเราให้ครบทีม!</span>
                    </div>

                    <div className="flex-1 flex items-center justify-center p-4 w-full">
                        <div className="grid grid-cols-4 gap-3 w-full max-w-sm px-2 perspective-container">
                            {cards.map((card, idx) => {
                                const isCardFlipped = flipped.includes(idx) || matched.includes(card.emoji);
                                const isMatched = matched.includes(card.emoji);
                                
                                return (
                                    <div 
                                        key={card.id} 
                                        className="w-full aspect-square cursor-pointer relative"
                                        onClick={() => handleFlip(idx)}
                                    >
                                        <div className={`card-inner ${isCardFlipped ? 'flipped' : ''}`}>
                                            {/* FRONT (Hidden side / Question Mark) */}
                                            <div className="card-front border-amber-950 bg-amber-400 text-amber-950 flex flex-col items-center justify-center shadow-md">
                                                <span className="text-3xl font-black">❓</span>
                                            </div>
                                            
                                            {/* BACK (Revealed side / Animal) */}
                                            <div className={`card-back border-amber-950 flex items-center justify-center text-4xl shadow-md transition-colors duration-300 ${isMatched ? 'bg-green-100 border-green-600' : 'bg-white'}`}>
                                                {card.emoji}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    
                    {matched.length === emojis.length && (
                        <div className="absolute inset-0 bg-amber-950/95 flex items-center justify-center flex-col z-30 animate-fade-in">
                            <div className="text-7xl mb-4 animate-bounce">🏆</div>
                            <h2 className="text-3xl text-yellow-300 font-bold">เก่งมากนักสำรวจ!</h2>
                            <p className="text-white mt-1">จับคู่และเรียนรู้ลักษณะของสัตว์เลื้อยคลานครบถ้วน!</p>
                        </div>
                    )}
                </div>
            );
        };

        // Game 4: Bird (Catch Stars in Sky)
        const GameBird = ({ onWin }) => {
            const [stars, setStars] = React.useState(0);
            const [starPos, setStarPos] = React.useState({ top: 50, left: 50 });
            
            const moveStar = () => {
                setStarPos({
                    top: Math.random() * 50 + 25,
                    left: Math.random() * 80 + 10
                });
            };

            React.useEffect(() => {
                moveStar();
                const interval = setInterval(moveStar, 1400);
                return () => clearInterval(interval);
            }, []);

            const catchStar = () => {
                playSound('coin');
                setStars(s => {
                    const next = s + 1;
                    if (next >= 5) {
                        playSound('win');
                        setTimeout(onWin, 1500);
                    }
                    return next;
                });
                moveStar();
            };

            return (
                <div className="h-full bg-sky-400 relative overflow-hidden flex flex-col star-bg">
                    <div className="w-full p-4 bg-black/40 text-white text-center font-bold text-lg z-10 mt-12">
                        ด่านที่ 4: กลุ่มนก 🐦
                    </div>
                    
                    <div className="text-white text-center mt-3 z-10 bg-black/30 p-2.5 mx-4 rounded-xl text-xs leading-normal">
                        <strong className="text-yellow-200">เกร็ดความรู้:</strong> มีขนเป็นแผง มีปีกบินได้ ออกลูกเป็นไข่!<br/>
                        <span className="text-emerald-300 font-bold">✨ แตะเก็บดวงดาวระยิบระยับกลางอากาศให้ครบ 5 ดวง!</span>
                    </div>

                    <div className="text-yellow-300 text-center mt-4 text-2xl font-bold">
                        🌟 ดวงดาวที่สะสม: {stars} / 5
                    </div>

                    {stars < 5 && (
                        <div 
                            className="absolute text-6xl transition-all duration-700 ease-out cursor-pointer hover:scale-125"
                            style={{ top: `${starPos.top}%`, left: `${starPos.left}%`, transform: 'translate(-50%, -50%)' }}
                            onMouseDown={catchStar}
                            onTouchStart={(e) => { e.preventDefault(); catchStar(); }}
                        >
                            <span className="absolute animate-ping">🌟</span>
                            <span className="relative">⭐</span>
                        </div>
                    )}
                    
                    {/* Decorative birds flying background */}
                    <div className="absolute top-1/3 left-10 text-4xl opacity-40 animate-float">🕊️</div>
                    <div className="absolute top-2/3 right-16 text-4xl opacity-30 animate-float" style={{ animationDelay: '1.5s' }}>🦅</div>
                </div>
            );
        };

        // Game 5: Mammal (Find Hidden Mom)
        const GameMammal = ({ onWin }) => {
            const [found, setFound] = React.useState(false);
            
            const handleFind = () => {
                playSound('coin');
                setFound(true);
                playSound('win');
                setTimeout(onWin, 2000);
            };

            return (
                <div className="h-full bg-pink-800 relative overflow-hidden flex flex-col bg-gradient-to-b from-pink-600 to-pink-950">
                    <div className="w-full p-4 bg-black/40 text-white text-center font-bold text-lg z-20 mt-12">
                        ด่านที่ 5: สัตว์เลี้ยงลูกด้วยนม 🐘
                    </div>
                    
                    <div className="text-white text-center mt-3 z-20 bg-black/30 p-2.5 mx-4 rounded-xl text-xs leading-normal">
                        <strong className="text-yellow-200">เกร็ดความรู้:</strong> มีขนเป็นเส้น ตัวเมียเลี้ยงลูกด้วยน้ำนม!<br/>
                        <span className="text-yellow-300 font-bold">👉 ค้นหาแม่ช้าง 🐘 ที่ซ่อนอยู่ในป่า เพื่อช่วยลูกช้างน้อย!</span>
                    </div>

                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>

                    {/* Various Animals as decoys */}
                    <div className="absolute top-[32%] left-[15%] text-5xl">🦓</div>
                    <div className="absolute top-[62%] left-[75%] text-5xl">🦒</div>
                    <div className="absolute top-[42%] left-[62%] text-5xl">🐅</div>
                    <div className="absolute top-[75%] left-[20%] text-5xl">🦍</div>

                    {/* Target Mom Elephant */}
                    <div 
                        className={`absolute text-7xl cursor-pointer transition-all duration-1000 ${found ? 'top-[45%] left-[35%] scale-150 z-30' : 'top-[80%] left-[80%] hover:scale-110'}`}
                        onClick={handleFind}
                    >
                        🐘
                        {!found && <div className="text-[10px] bg-red-500 text-white p-1 rounded-xl absolute -top-10 -left-6 whitespace-nowrap animate-bounce font-bold border-2 border-white">หาแม่ไม่เจอแงๆ 🥺</div>}
                    </div>

                    {found && (
                        <div className="absolute inset-0 bg-pink-900/90 flex items-center justify-center z-20 animate-fade-in">
                            <div className="flex gap-4 text-7xl mb-4 animate-bounce">
                                🐘 ❤️ 🐘
                            </div>
                            <h2 className="text-3xl text-yellow-300 font-bold">อบอุ่นที่สุด!</h2>
                            <p className="text-white mt-1">แม่ช้างให้นมลูกช้างและพากลับฝูงเรียบร้อย!</p>
                        </div>
                    )}
                </div>
            );
        };

        // Boss Battle: Sorting Game
        const BossBattle = ({ onWin }) => {
            const [currentAnimal, setCurrentAnimal] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [gameEnd, setGameEnd] = React.useState(false);

            const testAnimals = [
                { emoji: '🦈', correctId: 1, name: 'ฉลาม (ปลากระดูกอ่อน)' },
                { emoji: '🦅', correctId: 4, name: 'เหยี่ยว' },
                { emoji: '🐋', correctId: 5, name: 'วาฬ (เลี้ยงลูกด้วยนมนะจ๊ะ!)' },
                { emoji: '🐊', correctId: 3, name: 'จระเข้' },
                { emoji: '🐸', correctId: 2, name: 'กบมหัศจรรย์' },
            ];

            const handleSort = (zoneId) => {
                if (gameEnd) return;
                
                if (testAnimals[currentAnimal].correctId === zoneId) {
                    playSound('coin');
                    setScore(s => s + 1);
                } else {
                    playSound('wrong');
                }

                if (currentAnimal < testAnimals.length - 1) {
                    setCurrentAnimal(curr => curr + 1);
                } else {
                    setGameEnd(true);
                    if (score + (testAnimals[currentAnimal].correctId === zoneId ? 1 : 0) >= 4) {
                        playSound('win');
                        setTimeout(onWin, 3000);
                    } else {
                        // Fail, try again
                        setTimeout(() => {
                            setCurrentAnimal(0);
                            setScore(0);
                            setGameEnd(false);
                        }, 2000);
                    }
                }
            };

            return (
                <div className="h-full bg-red-950 relative flex flex-col p-4 text-white bg-gradient-to-b from-red-900 to-black">
                    <div className="text-center mb-4 mt-12">
                        <h2 className="text-2xl font-bold text-yellow-400">บอส: ราชาแห่งความสับสน 👑</h2>
                        <p className="text-xs text-gray-300">บอสจับสัตว์ผสมปนเปกันหมดแล้ว! แยกกลุ่มให้ที (ต้องถูก 4/5)</p>
                        <div className="text-lg mt-2 bg-red-900/60 inline-block px-4 py-1 rounded-full border border-red-500">
                            คะแนนสะสม: {score} / 5
                        </div>
                    </div>

                    {!gameEnd ? (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="text-8xl animate-bounce mb-3 bg-white/10 p-6 rounded-full shadow-[0_0_30px_rgba(253,224,71,0.4)] border-2 border-red-500">
                                {testAnimals[currentAnimal].emoji}
                            </div>
                            <div className="text-lg mb-6 font-bold text-yellow-300 bg-black/40 px-3 py-1 rounded-md">{testAnimals[currentAnimal].name}</div>
                            
                            <div className="grid grid-cols-2 gap-3.5 w-full max-w-xs">
                                {ZONES.map(zone => (
                                    <button 
                                        key={zone.id}
                                        onClick={() => handleSort(zone.id)}
                                        className={`${zone.color} p-3 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 active:scale-95 text-white border-b-4 border-black/40`}
                                    >
                                        <span className="text-xl">{zone.icon}</span> {zone.type}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="text-7xl mb-4">{score >= 4 ? '🎉' : '💀'}</div>
                            <h2 className="text-3xl font-bold mb-4">{score >= 4 ? 'คุณสยบบอสสำเร็จ!' : 'ยังไม่ผ่านนะจ๊ะ!'}</h2>
                            {score >= 4 ? (
                                <p className="text-center text-green-300 animate-pulse font-bold">เก่งมาก! มารับเกียรติบัตรนักสำรวจกันเถอะ</p>
                            ) : (
                                <p className="text-center text-red-300">ระบบกำลังรีเซ็ตคำถามเพื่อให้คุณครูทบทวนอีกรอบ...</p>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // 6. Scene: Certificate & Success Screen
        const Certificate = ({ studentInfo, saveFile, onRestart }) => {
            return (
                <div className="h-full bg-slate-900 overflow-y-auto p-4 flex flex-col items-center justify-center">
                    {/* Certificate Card Design */}
                    <div className="w-full max-w-sm bg-amber-50 border-8 border-yellow-500 rounded-3xl p-6 shadow-2xl relative text-center text-gray-800 border-double">
                        {/* Decorative seals */}
                        <div className="absolute top-2 left-2 text-xl">🌟</div>
                        <div className="absolute top-2 right-2 text-xl">🌟</div>
                        
                        <h2 className="text-xl font-black text-amber-800 tracking-wider">เกียรติบัตรนักสำรวจยอดเยี่ยม</h2>
                        <h3 className="text-xs font-bold text-gray-500 mb-6 uppercase tracking-widest">Vertebrates Explorer Club</h3>
                        
                        <p className="text-sm text-gray-600 mb-2">เกียรติบัตรฉบับนี้ให้ไว้เพื่อแสดงว่า</p>
                        
                        <p className="text-xl font-bold text-blue-900 border-b-2 border-dashed border-blue-400 pb-1 mb-2 inline-block px-4">
                            {studentInfo.name}
                        </p>
                        
                        <p className="text-xs text-gray-600 font-semibold mb-4">
                            ระดับชั้น <span className="text-blue-800 font-bold">{studentInfo.class}</span> &nbsp;&nbsp; เลขที่ <span className="text-blue-800 font-bold">{studentInfo.no}</span>
                        </p>
                        
                        <p className="text-xs text-gray-600 px-4 leading-relaxed mb-6">
                            ได้เรียนรู้ ฝึกฝน และสอบผ่านภารกิจจำแนกสัตว์มีกระดูกสันหลังทั้ง 5 กลุ่ม ได้แก่ กลุ่มปลา, สัตว์สะเทินน้ำสะเทินบก, สัตว์เลื้อยคลาน, สัตว์ปีก และสัตว์เลี้ยงลูกด้วยนม ได้รับคะแนนเต็มภาคภูมิ!
                        </p>

                        <div className="flex justify-around items-center bg-yellow-100 border-2 border-yellow-300 rounded-2xl p-3 mb-6">
                            <div>
                                <span className="block text-[10px] text-gray-500 font-bold">ดาวที่ได้รับ</span>
                                <span className="text-xl font-bold text-yellow-600">⭐ {saveFile.stars} / 15</span>
                            </div>
                            <div className="w-[1px] h-8 bg-yellow-300"></div>
                            <div>
                                <span className="block text-[10px] text-gray-500 font-bold">สถานะ</span>
                                <span className="text-xs font-bold text-emerald-600">ผ่านเกณฑ์ยอดเยี่ยม! ✅</span>
                            </div>
                        </div>

                        {/* Signature of turtle */}
                        <div className="flex justify-between items-end mt-4">
                            <div className="text-[10px] text-gray-400 text-left">
                                วันที่อนุมัติ: {new Date().toLocaleDateString('th-TH')}
                            </div>
                            <div className="text-center">
                                <span className="text-xl block">🐢</span>
                                <span className="text-[9px] block text-amber-900 font-bold border-t border-amber-300 pt-0.5">ศ. ดร. เต่าน้อย (ผู้ประเมิน)</span>
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 text-center text-white text-xs max-w-sm px-4">
                        <p className="mb-4 text-yellow-300 font-bold">📸 แนะนำให้เด็กๆ แคปหน้าจอหน้านี้ ส่งครูเพื่อรับคะแนนได้เลยจ้า!</p>
                        <Button onClick={onRestart} className="w-full bg-blue-500 hover:bg-blue-400 text-white border-blue-700">
                            <i className="fa-solid fa-rotate-left mr-1"></i> เริ่มเล่นใหม่อีกครั้ง
                        </Button>
                    </div>
                </div>
            );
        };

        // Encyclopedia / Collection Book
        const Encyclopedia = ({ saveFile, onClose }) => {
            return (
                <div className="h-full bg-[linear-gradient(to_bottom,rgba(120,53,4,0.4),rgba(120,53,4,0.9)),url('https://www.transparenttextures.com/patterns/wood-pattern.png')] p-4 flex flex-col mt-12">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-white drop-shadow-md">📖 สมุดสะสมสัตว์</h2>
                        <button onClick={onClose} className="bg-red-500 text-white w-10 h-10 rounded-full font-bold shadow-md hover:bg-red-600 flex items-center justify-center border-2 border-white">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto grid grid-cols-1 gap-4 pb-12">
                        {ZONES.map(zone => {
                            const isUnlocked = saveFile.completedLevels.includes(zone.id);
                            return (
                                <div key={zone.id} className={`glass-panel p-4 flex items-center gap-4 ${isUnlocked ? 'bg-white/95 text-gray-800' : 'bg-black/50 text-gray-400 grayscale'}`}>
                                    <div className={`w-14 h-14 flex-shrink-0 rounded-full flex items-center justify-center text-3xl shadow-inner ${isUnlocked ? zone.color : 'bg-gray-700'}`}>
                                        {isUnlocked ? zone.icon : '❓'}
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="font-bold text-base text-blue-950">{isUnlocked ? zone.type : 'ยังไม่ปลดล็อก'}</h3>
                                        <p className="text-[10px] mt-1 leading-relaxed text-gray-600">{isUnlocked ? zone.info : 'เอาชนะด่านนี้เพื่อศึกษารายละเอียดของสัตว์กลุ่มนี้'}</p>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [scene, setScene] = React.useState('menu'); // menu, register, intro, map, level1-5, boss, certificate, book
            const [isMutedState, setIsMutedState] = React.useState(false);
            const [studentInfo, setStudentInfo] = React.useState({
                name: '',
                class: '',
                no: ''
            });
            const [saveFile, setSaveFile] = React.useState({
                unlockedLevels: 1,
                completedLevels: [],
                stars: 0,
                hasBeatenBoss: false
            });

            // Load Saved Progress and Student info
            React.useEffect(() => {
                const saved = localStorage.getItem('vertebrates_save_v2');
                const savedInfo = localStorage.getItem('vertebrates_student_info');
                if (saved) {
                    setSaveFile(JSON.parse(saved));
                }
                if (savedInfo) {
                    setStudentInfo(JSON.parse(savedInfo));
                }
            }, []);

            const saveProgress = (newSave) => {
                setSaveFile(newSave);
                localStorage.setItem('vertebrates_save_v2', JSON.stringify(newSave));
            };

            const handleRegister = (info) => {
                setStudentInfo(info);
                localStorage.setItem('vertebrates_student_info', JSON.stringify(info));
                setScene('intro');
            };

            const handleWinLevel = (levelId) => {
                const newSave = { ...saveFile };
                if (!newSave.completedLevels.includes(levelId)) {
                    newSave.completedLevels.push(levelId);
                    newSave.stars += 3;
                    if (levelId === newSave.unlockedLevels && newSave.unlockedLevels < 5) {
                        newSave.unlockedLevels += 1;
                    }
                }
                saveProgress(newSave);
                setScene('map');
            };

            const handleWinBoss = () => {
                const newSave = { ...saveFile, hasBeatenBoss: true };
                saveProgress(newSave);
                setScene('certificate');
            };

            const handleRestart = () => {
                const newSave = {
                    unlockedLevels: 1,
                    completedLevels: [],
                    stars: 0,
                    hasBeatenBoss: false
                };
                saveProgress(newSave);
                setScene('register');
            };

            const renderScene = () => {
                switch(scene) {
                    case 'menu': return <MainMenu onStart={() => setScene(studentInfo.name ? 'map' : 'register')} />;
                    case 'register': return <RegisterScreen onRegister={handleRegister} />;
                    case 'intro': return <IntroStory onNext={() => setScene('map')} studentInfo={studentInfo} />;
                    case 'map': return <WorldMap saveFile={saveFile} onSelectLevel={(id) => setScene(id === 'boss' ? 'levelboss' : `level${id}`)} onOpenBook={() => setScene('book')} studentInfo={studentInfo} />;
                    case 'level1': return <GameFish onWin={() => handleWinLevel(1)} />;
                    case 'level2': return <GameFrog onWin={() => handleWinLevel(2)} />;
                    case 'level3': return <GameReptile onWin={() => handleWinLevel(3)} />;
                    case 'level4': return <GameBird onWin={() => handleWinLevel(4)} />;
                    case 'level5': return <GameMammal onWin={() => handleWinLevel(5)} />;
                    case 'levelboss': return <BossBattle onWin={handleWinBoss} />;
                    case 'book': return <Encyclopedia saveFile={saveFile} onClose={() => setScene('map')} />;
                    case 'certificate': return <Certificate studentInfo={studentInfo} saveFile={saveFile} onRestart={handleRestart} />;
                    default: return <MainMenu onStart={() => setScene('register')} />;
                }
            };

            return (
                <div className="game-container">
                    <GameHeader 
                        isMutedState={isMutedState} 
                        onMuteToggle={(m) => setIsMutedState(m)} 
                        onBackMenu={scene !== 'menu' && scene !== 'register' && scene !== 'intro' && scene !== 'certificate' ? () => setScene('map') : null}
                    />
                    {renderScene()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
